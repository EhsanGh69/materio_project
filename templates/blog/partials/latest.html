<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="row mb-3">
                <div class="col-12">
                    <div class="d-flex align-items-center rounded justify-content-between bg-light py-2 px-4 mb-3">
                        <h3 class="m-0">
                            <i class="fas fa-fire-alt"></i>
                            <span>پست های داغ</span>
                        </h3>
                    </div>
                </div>
                {% for post in posts %}
                    <div class="col-lg-6">
                        <div class="d-flex mb-3 bg-light">
                            
                            <div class="w-100 d-flex flex-column justify-content-center 
                                    px-3" style="height: 150px;">
                                <div class="mb-1" style="font-size: 13px;">
                                    <a href="" class="text-decoration-none text-dark">
                                        <img src="{{ post.author.user_avatar.avatar.url }}"
                                        style="border-radius: 50%;" 
                                        alt="{{ post.author.username }}" width="40">
                                        <span dir="ltr">{{ post.author.username }}</span>
                                    </a>
                                    <span> - </span>
                                    <span class="text-muted">{{ post.created_at|timesince }} پیش</span>
                                </div>
                                <p class="mt-3">
                                    <a class="h6 text-decoration-none text-dark" 
                                    href="#" title="{{ post.title }}">
                                        {{ post.title|truncatewords:8 }}
                                    </a>
                                </p>
                                <p>
                                    <a href="" 
                                        class="badge badge-info text-decoration-none">
                                        {{ post.category.name }}
                                    </a>
                                    &nbsp;
                                    <small class="text-muted">خواندن {{ post.study_time }} دقیقه</small>
                                </p>
                            </div>

                            <div class="d-flex flex-column">
                                <a href="#" title="{{ post.title }}">
                                    <img src="{{ post.image.url }}" 
                                    style="width: 100px; height: 100px; object-fit: cover;" 
                                    alt="{{ post.title }}">
                                </a>
                                <span class="mt-3 text-center">
                                    <span class="post-info">
                                        <i class="fas fa-heart text-danger"></i> 0
                                    </span>
                                    &nbsp;&nbsp;
                                    <span class="post-info">
                                        <i class="fas fa-comment-alt text-info"></i> 
                                        {{ post.post_comments.count }}
                                    </span>
                                </span>
                            </div>
                        </div>
                    </div>
                {% empty %}
                    <div class="col-12 alert alert-danger text-center">
                        <i class="far fa-times-circle"></i>
                        <span>در حال حاضر پستی وجود ندارد</span>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
